<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progetti — Occhino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap"
        rel="stylesheet" />
    <link href="css.css" rel="stylesheet" />
</head>

<body>

    <section class="hero">
        <div class="hero__bg"></div>

        <!-- Logo -->
        <a class="hero__logo" href="/" aria-label="Torna alla home">
            <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="35" cy="35" r="31" fill="none" stroke="#C97C4D" stroke-width="2.5" />
                <text x="35" y="49" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="40"
                    font-weight="700" fill="#C97C4D">O</text>
            </svg>
            <span class="hero__logo-label">occhino.it</span>
        </a>

        <h1 class="hero__title">I Nostri Progetti</h1>
        <p class="hero__subtitle">Roccafiorita &middot; Sicilia</p>

        <!-- Buttons injected here -->
        <nav class="hero__buttons" id="btn-grid" aria-label="Sezioni del sito"></nav>
    </section>

    <footer class="page-footer">
        &copy; <span id="year"></span> occhino.it &middot; <a href="/">Home</a>
    </footer>

    <script src="projects.js"></script>
    <script>
        const grid = document.getElementById('btn-grid');
        projects.forEach(entry => {
            const a = document.createElement('a');
            a.className = 'proj-btn';
            a.href = entry.link;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = entry.name;
            grid.appendChild(a);
        });
    </script>
</body>

</html>
